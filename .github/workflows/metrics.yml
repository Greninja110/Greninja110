name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Base stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.base.svg
          user: Greninja110
          base: activity, community, repositories
          config_timezone: Asia/Kolkata
          config_output: svg
          config_display: regular

      - name: Language breakdown
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          user: Greninja110
          base: ""
          commits_authoring: Abhijeet Sahoo, Greninja110, Greninja110@users.noreply.github.com, abhijeetsahoo2452004@gmail.com
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_ignored: CSV, TSV, JSON, XML, YAML, TOML, Text, Markdown, SCSS, Sass, Less
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming, data
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage
          plugin_languages_colors: github
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: Greninja110
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
          config_output: svg
