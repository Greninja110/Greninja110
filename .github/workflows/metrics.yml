name: Metrics

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Base stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.base.svg
          user: Greninja110
          base: activity, community, repositories
          config_timezone: Asia/Kolkata
          config_output: svg
          config_display: regular
          output_action: nothing

      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: Greninja110
          base: activity
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
          config_output: svg
          output_action: nothing

      - name: Language breakdown
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          pip install requests --quiet
          python generate_lang_chart.py

      - name: Commit all metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add metrics.base.svg metrics.isocalendar.svg metrics.languages.svg tech_stack_langs.svg
          git diff --cached --quiet || git commit -m "Update metrics - [Skip GitHub Action]"
          git push
